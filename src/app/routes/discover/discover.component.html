<div class="relative flex flex-col grow gap-4">
  <div class="flex items-center gap-3">
    <app-search-box
      class="grow"
      [dataSource]="pokemons()"
      (onSelect)="scrollToPokemon($event)"
    ></app-search-box>

    <select
      class="select w-28"
      [value]="currentGeneration()"
      [disabled]="isLoading()"
      (change)="setGeneration($event)"
    >
      @for (opt of generationOptions; track opt.value) {
        <option [value]="opt.value" [selected]="opt.value === currentGeneration()">
          {{ opt.label }}
        </option>
      }
    </select>
  </div>

  @if (isLoading()) {
    <div class="absolute inset-0 z-10 flex items-center justify-center bg-base-100/80 fade-in">
      <!-- <img src="splash.gif" alt="Running Pikachu gif" class="w-24" /> -->
      <span class="loading loading-dots loading-md"></span>
    </div>
  }

  <app-pokemon-carousel
    [pokemons]="pokemons()"
    (onSlideChange)="onSlideChange($event)"
    (onDetailsClick)="getPokemonAsync($event)"
  ></app-pokemon-carousel>
</div>

<dialog #modalRef class="modal modal-bottom">
  <div class="modal-box h-80 md:h-auto">
    <app-pokemon-detail
      class="custom-max-w"
      [pokemon]="selectedPokemon()"
      (onFavoriteClick)="toggleFavoriteSelected()"
    ></app-pokemon-detail>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>Close</button>
  </form>
</dialog>
