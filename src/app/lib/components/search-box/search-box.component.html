<div class="relative">
  <label class="input flex items-center gap-2 w-full">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 16 16"
      fill="currentColor"
      class="h-6 w-6 opacity-70"
    >
      <path
        fill-rule="evenodd"
        d="M9.965 11.026a5 5 0 1 1 1.06-1.06l2.755 2.754a.75.75 0 1 1-1.06 1.06l-2.755-2.754ZM10.5 7a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0Z"
        clip-rule="evenodd"
      />
    </svg>
    <input
      #inputRef
      type="text"
      class="grow"
      placeholder="Search"
      (keyup)="setInputValue(inputRef.value)"
      (keydown)="onInputKeydown($event)"
    />
  </label>

  <ul
    #resultsRef
    class="absolute top-[110%] menu flex-nowrap bg-base-100/80 border-2 border-muted rounded-box w-full max-h-48 overflow-y-auto fade-in"
    [class.hidden]="!isOpen()"
  >
    @for (item of filteredDataSource(); track $index) {
      <li tabindex="0" (click)="select(item.name)" (keydown)="onResultKeydown($event, item)">
        <a class="flex flex-row items-baseline capitalize">
          <span class="capitalize">{{ item.name }}</span>
          <span class="font-mono text-muted text-xs ml-auto">#{{ item.id | number: '3.0' }}</span>
        </a>
      </li>
    } @empty {
      <li><a>Oops, nothing matches your search!</a></li>
    }
  </ul>
</div>
