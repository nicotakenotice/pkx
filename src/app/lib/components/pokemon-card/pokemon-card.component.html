@if (pokemon(); as pokemon) {
  <div class="relative flex flex-col grow">
    <div class="flex flex-col justify-end items-center h-56">
      <img
        [src]="pokemon.sprite"
        [alt]="pokemon.name"
        style="transform: scale(1.5)"
        (click)="startAnimation($event)"
      />
    </div>

    <div class="text-center capitalize py-8 border-t border-muted">
      @if (pokemon.isFavorite) {
        <span class="inline-block mr-1">
          <i class="bi bi-star-fill text-yellow-500"></i>
        </span>
      }
      {{ pokemon.name }}
    </div>

    <div class="flex justify-center items-center gap-2 mt-auto mb-4">
      <button class="btn w-30" (click)="onDetailsClick.emit(pokemon.name)">Details</button>
      <button class="btn btn-square" (click)="onFavoriteClick.emit(pokemon.name)">
        @if (pokemon.isFavorite) {
          <i class="bi bi-star-fill text-yellow-500"></i>
        } @else {
          <i class="bi bi-star"></i>
        }
      </button>
    </div>
  </div>
}
